name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-22.04 / gcc-12
            artifact: ubuntu-22.04-gcc-12
            os: ubuntu-22.04
            cc: gcc-12
            cxx: g++-12
            sudo: sudo

          - label: ubuntu-22.04 / clang-14
            artifact: ubuntu-22.04-clang-14
            os: ubuntu-22.04
            cc: clang-14
            cxx: clang++-14
            sudo: sudo

          - label: debian-12 / gcc-12
            artifact: debian-12-gcc-12
            os: ubuntu-22.04
            container: debian:12
            cc: gcc-12
            cxx: g++-12
            sudo: ""   # root inside the container

    env:
      CC:  ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          ${{ matrix.sudo }} apt-get update -q
          ${{ matrix.sudo }} apt-get install -y --no-install-recommends \
            ca-certificates \
            git \
            cmake \
            make \
            libboost-dev \
            ${{ matrix.cc }} \
            ${{ matrix.cxx }}

      # Cache the GoogleTest FetchContent download between runs.
      - name: Cache GoogleTest
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-v2-${{ matrix.label }}

      - name: Configure
        run: cmake -B build -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        run: ctest --test-dir build --parallel $(nproc) --output-on-failure --timeout 60

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gsup_map_proxy-${{ matrix.artifact }}
          path: build/src/gsup_map_proxy
          if-no-files-found: error
          retention-days: 7

  # ── Code coverage (gcov + Codecov) ──────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake make libboost-dev gcc-12 g++-12 lcov

      - name: Cache GoogleTest
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-v2-coverage

      - name: Configure (with coverage flags)
        env:
          CC:  gcc-12
          CXX: g++-12
        run: |
          cmake -B build \
            -DBUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        run: ctest --test-dir build --parallel 1 --output-on-failure --timeout 60

      - name: Collect coverage
        run: |
          lcov --capture \
               --directory build \
               --output-file coverage_raw.info \
               --gcov-tool gcov-12
          lcov --extract coverage_raw.info \
               "$(pwd)/src/*" \
               --output-file coverage.info
          lcov --list coverage.info
          rm coverage_raw.info   # prevent Codecov auto-discovery of unfiltered file

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Static analysis (clang-tidy) ────────────────────────────────────────────
  static-analysis:
    name: Static Analysis (clang-tidy)
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake make libboost-dev clang-14 clang-tidy-14

      - name: Cache GoogleTest
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-v2-clang-tidy

      - name: Configure (export compile commands)
        env:
          CC:  clang-14
          CXX: clang++-14
        run: |
          cmake -B build \
            -DBUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build (generate headers)
        run: cmake --build build --parallel $(nproc)

      - name: Run clang-tidy
        run: |
          run-clang-tidy-14 \
            -p build \
            -header-filter='.*src/.*' \
            $(find src -name '*.cpp' | sort)
