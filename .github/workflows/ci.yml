name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-22.04 / gcc-12
            os: ubuntu-22.04
            cc: gcc-12
            cxx: g++-12
            sudo: sudo

          - label: ubuntu-22.04 / clang-14
            os: ubuntu-22.04
            cc: clang-14
            cxx: clang++-14
            sudo: sudo

          - label: debian-12 / gcc-12
            os: ubuntu-22.04
            container: debian:12
            cc: gcc-12
            cxx: g++-12
            sudo: ""   # root inside the container

    env:
      CC:  ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          ${{ matrix.sudo }} apt-get update -q
          ${{ matrix.sudo }} apt-get install -y --no-install-recommends \
            ca-certificates \
            git \
            cmake \
            libboost-dev \
            ${{ matrix.cc }} \
            ${{ matrix.cxx }}

      # Cache the GoogleTest FetchContent download between runs.
      - name: Cache GoogleTest
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: gtest-v1.14.0-${{ matrix.label }}

      - name: Configure
        run: cmake -B build -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        run: ctest --test-dir build --parallel $(nproc) --output-on-failure

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gsup_map_proxy-${{ matrix.label }}
          path: build/gsup_map_proxy
          if-no-files-found: error
          retention-days: 7
