name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-amd64-gcc
            artifact: linux-amd64
            os: ubuntu-22.04
            cc: gcc-12
            cxx: g++-12
            sudo: sudo

          - label: debian-12-gcc
            artifact: debian-12-amd64
            os: ubuntu-22.04
            container: debian:12
            cc: gcc-12
            cxx: g++-12
            sudo: ""

    env:
      CC:  ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          ${{ matrix.sudo }} apt-get update -q
          ${{ matrix.sudo }} apt-get install -y --no-install-recommends \
            ca-certificates git cmake make libboost-dev \
            ${{ matrix.cc }} ${{ matrix.cxx }}

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Package binary
        run: |
          mkdir -p dist
          cp build/src/gsup_map_proxy dist/gsup_map_proxy-${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gsup_map_proxy-${{ matrix.artifact }}
          path: dist/gsup_map_proxy-${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
